<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aiman - Ayam Gunting</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #fff8f0;
        }
        .navbar {
            background-color: #ff6b00;
        }
        .btn-orange {
            background-color: #ff6b00;
            color: white;
            border: none;
        }
        .btn-orange:hover {
            background-color: #e65c00;
            color: white;
        }
        .section {
            padding: 60px 0;
            border-bottom: 2px solid #ffe0cc;
        }
        .section-title {
            color: #ff6b00;
            font-weight: bold;
            margin-bottom: 20px;
        }
        .card {
            border: 2px solid #ff6b00;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-img-top {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        footer {
            background-color: #ff6b00;
            color: white;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">Aiman</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#section1">Tentang Aiman</a></li>
                    <li class="nav-item"><a class="nav-link" href="#section2">Ayam Gunting</a></li>
                    <!-- <li class="nav-item"><a class="nav-link" href="#section3">Pesan</a></li> -->
                </ul>
            </div>
        </div>
    </nav>

    <section id="section1" class="section">
        <div class="container">
            <h2 class="section-title text-center">Ini Aiman</h2>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card">
                        <img src="iman.jpg" class="card-img-top" alt="Aiman">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="section2" class="section">
        <div class="container">
            <h2 class="section-title text-center">Aiman Jual Ayam Gunting</h2>
            <div class="row justify-content-center">
                <div class="col-md-6">
                    <div class="card">
                        <img src="iman2.jpeg" class="card-img-top" alt="Ayam Gunting">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="section3" class="section">
        <div class="container text-center">
            <h2 class="section-title">Belilah Ayam Gunting Dengan Aiman</h2>
            <p class="lead mb-4">Ayam gunting berkualiti, harga terjangkau!</p>
            <!-- <a href="#" class="btn btn-orange btn-lg">Pesan Sekarang</a> -->
        </div>
    </section>

    <footer class="py-4 text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 Aiman - Ayam Gunting</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
